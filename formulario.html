<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>

    <link rel="shortcut icon" href="./assets/images/download.jpg" type="image/x-icon">
    <link rel="stylesheet" href="./estilos/brite.css">
    <link rel="stylesheet" href="./estilos/estilosSitio.css">

    <script src="./scripts/jQuery v4.0.0.js"></script>
    <script src="./scripts/bootstrap.js"></script>
    <script src="./scripts/formulario.js"></script>
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="light">
        <a class="navbar-brand" href="#">KDS Registro</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="./index.html">Inicio</a>
                </li>
                <li class="nav-item active">
                    <a class="nav-link" href="./formulario.html">Formulario de Registro</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col">
                <p class="h3">Formulario Registro</p>
            </div>
        </div>
        <br>

        <form id="formularioRegistro">
            <div class="row">
                <div class="col">
                    <label for="inputNombre" class="form-label">Nombre:</label>
                    <input type="text" name="nombreUsuario" id="inputNombre" placeholder="Nombre completo..."
                        class="form-control" onchange="validarInput($(this));">
                    <div class="alert alert-danger" role="alert" id="alertaNombre"></div>
                </div>

                <div class="col">
                    <label for="inputUsuario" class="form-label">Usuario:</label>
                    <input type="text" name="nombreUsuarioLogin" id="inputUsuario" placeholder="Nombre de usuario..."
                        class="form-control" onchange="validarInput($(this));">
                    <div class="alert alert-danger" role="alert" id="alertaUsuario"></div>
                </div>
            </div>
            <br>

            <div class="row">
                <div class="col">
                    <label for="inputFechaIngreso" class="form-label">Fecha Ingreso:</label>
                    <input type="date" name="fechaIngresoUsuario" id="inputFechaIngreso" class="form-control"
                        onchange="validarFecha($(this));">
                    <div class="alert alert-danger" role="alert" id="alertaFechaIngreso"></div>
                </div>

                <div class="col">
                    <label for="inputEmail" class="form-label">Email:</label>
                    <input type="email" name="emailUsuario" id="inputEmail" placeholder="usuario@servidor.com"
                        class="form-control" onchange="validarEmail($(this));">
                    <div class="alert alert-danger" role="alert" id="alertaEmail"></div>
                </div>
            </div>
            <br>

            <div class="row">
                <div class="col">
                    <label for="inputSitioWeb" class="form-label">Sitio Web:</label>
                    <input type="url" name="sitioWebUsuario" id="inputSitioWeb" placeholder="https://www.sitio.com"
                        class="form-control" onchange="validarSitioWeb($(this));">
                    <div class="alert alert-danger" role="alert" id="alertaSitioWeb"></div>
                </div>
            </div>
            <br>

            <div class="row">
                <div class="col d-flex justify-content-end">
                    <button type="button" class="btn btn-secondary me-2"
                        onclick="limpiarFormulario();">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="validarFormulario();">Enviar</button>
                </div>
            </div>
        </form>
    </div>
</body>

</html>
